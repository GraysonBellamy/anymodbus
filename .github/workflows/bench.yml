name: Benchmarks

# Manual dispatch only — benchmarks are noisy on shared GitHub runners and
# the absolute numbers depend on the runner generation. Run locally with
# `make bench` for trustworthy comparisons.
on:
  workflow_dispatch:
    inputs:
      python:
        description: "Python version to benchmark on"
        required: false
        default: "3.13"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  UV_FROZEN: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  bench:
    name: Benchmarks (py${{ inputs.python }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Python ${{ inputs.python }}
        run: uv python install ${{ inputs.python }}
      - name: Install dependencies
        run: uv sync --python ${{ inputs.python }} --group test --group bench
      - name: Run benchmarks
        run: |
          if [ ! -d benchmarks ]; then
            echo "::warning::benchmarks/ directory not present yet (expected in v0.2 per DESIGN §18)"
            exit 0
          fi
          uv run --python ${{ inputs.python }} pytest benchmarks/ \
            --benchmark-only --benchmark-json=benchmark.json -v
      - name: Upload benchmark results
        if: hashFiles('benchmark.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ inputs.python }}-${{ github.run_id }}
          path: benchmark.json
          retention-days: 30
