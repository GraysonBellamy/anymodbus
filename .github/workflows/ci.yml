name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  UV_FROZEN: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --group lint
      - name: Ruff check
        run: uv run ruff check --output-format=github
      - name: Ruff format check
        run: uv run ruff format --check

  typecheck:
    name: Type check (mypy + pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --group type --group test
      - name: mypy
        run: uv run mypy
      - name: pyright
        run: uv run pyright

  test:
    name: Unit tests (${{ matrix.os }} · py${{ matrix.python }})
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.13", "3.14"]
        include:
          # Linux-only: free-threaded build check (advisory)
          - os: ubuntu-latest
            python: "3.13t"
            allow-failure: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow-failure == true }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }} --all-extras --group test
      - name: Run unit tests
        run: >
          uv run --python ${{ matrix.python }} pytest
          tests/unit
          --cov --cov-report=xml -v
      - name: Run integration tests (Linux only — PTY-backed pair)
        if: runner.os == 'Linux'
        run: >
          uv run --python ${{ matrix.python }} pytest
          tests/integration
          --cov --cov-append --cov-report=xml -v
      - name: Upload coverage
        if: matrix.python == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  build:
    name: Build sdist + wheel
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs needs full history
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install Python
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Check artifacts
        run: |
          ls -la dist/
          uv run --with twine twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
