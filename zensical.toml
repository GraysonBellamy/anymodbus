[project]
site_name = "anymodbus"
site_description = "Async-native Modbus RTU client for Python, built on AnyIO and anyserial."
site_url = "https://graysonbellamy.github.io/anymodbus/"
repo_url = "https://github.com/GraysonBellamy/anymodbus"
repo_name = "GraysonBellamy/anymodbus"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"
nav = [
    { Home = "index.md" },
    { "Getting started" = [
        { Quickstart = "quickstart.md" },
        { "Migration from pymodbus" = "migration-from-pymodbus.md" },
        { "Migration from minimalmodbus" = "migration-from-minimalmodbus.md" },
    ] },
    { Guides = [
        { Configuration = "configuration.md" },
        { "RTU framing" = "rtu.md" },
        { "Length-aware framer" = "framing.md" },
        { Timing = "timing.md" },
        { Decoders = "decoders.md" },
        { Capabilities = "capabilities.md" },
        { Cancellation = "cancellation.md" },
        { "Sync wrapper" = "sync.md" },
    ] },
    { Reliability = [
        { Exceptions = "exceptions.md" },
        { Troubleshooting = "troubleshooting.md" },
    ] },
    { Development = [
        { Testing = "testing.md" },
        { Performance = "performance.md" },
    ] },
    { Reference = [
        { Changelog = "changelog.md" },
        { Design = "design.md" },
    ] },
]

[project.theme]
variant = "classic"
features = [
    "content.code.copy",
    "content.code.annotate",
    "navigation.instant",
    "navigation.tracking",
    "navigation.sections",
    "navigation.indexes",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "blue"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "blue"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
